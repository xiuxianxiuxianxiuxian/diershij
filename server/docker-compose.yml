version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cultivation-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cultivation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cultivation-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: cultivation-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=cultivation
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GAME_SERVER_HOST=game-server
      - GAME_SERVER_PORT=50051
      - JWT_SECRET=cultivation-jwt-secret-key-2024
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      game-server:
        condition: service_started

  game-server:
    build:
      context: ./game-server
      dockerfile: Dockerfile
    container_name: cultivation-game-server
    ports:
      - "50051:50051"
    environment:
      - GRPC_HOST=0.0.0.0
      - GRPC_PORT=50051
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=cultivation
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  heavenly-dao:
    build:
      context: ./heavenly-dao
      dockerfile: Dockerfile
    container_name: cultivation-heavenly-dao
    ports:
      - "50052:50052"
    environment:
      - GRPC_HOST=0.0.0.0
      - GRPC_PORT=50052

  ai-scheduler:
    build:
      context: ./ai-scheduler
      dockerfile: Dockerfile
    container_name: cultivation-ai-scheduler
    ports:
      - "50053:50053"
    environment:
      - GRPC_HOST=0.0.0.0
      - GRPC_PORT=50053
      - LLM_PROVIDER=deepseek
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_RATE_LIMIT=600

  world-engine:
    build:
      context: ./world-engine
      dockerfile: Dockerfile
    container_name: cultivation-world-engine
    ports:
      - "50054:50054"
    environment:
      - GRPC_HOST=0.0.0.0
      - GRPC_PORT=50054

volumes:
  postgres_data:
  redis_data:

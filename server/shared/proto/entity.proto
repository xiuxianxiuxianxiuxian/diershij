syntax = "proto3";

package cultivation;

option go_package = "github.com/cultivation-world/shared/proto;cultivation";

message Entity {
    string id = 1;
    string entity_type = 2;
    string name = 3;
    string realm = 4;
    WorldPosition position = 5;
    Attributes attributes = 6;
    Karma karma = 7;
    string status = 8;
    int64 created_at = 9;
    int64 updated_at = 10;
    SpiritStones spirit_stones = 11;
    repeated SpellData spells = 12;
    repeated ItemData items = 13;
}

message WorldPosition {
    string region_id = 1;
    double x = 2;
    double y = 3;
}

message SpiritualRoot {
    string element = 1;
    int32 purity = 2;
}

message Injury {
    string type = 1;
    int32 severity = 2;
    string cause = 3;
    int64 heal_time = 4;
    string description = 5;
}

message Buff {
    string name = 1;
    string effect = 2;
    double value = 3;
    string source = 4;
    int64 expiry_time = 5;
}

message Debuff {
    string name = 1;
    string effect = 2;
    double value = 3;
    string source = 4;
    int64 expiry_time = 5;
}

message Attributes {
    double qi = 1;
    double max_qi = 2;
    double spiritual_power = 3;
    double max_spiritual_power = 4;
    double divine_sense = 5;
    int32 comprehension = 6;
    int32 constitution = 7;
    int32 luck = 8;
    double cultivation_progress = 9;
    double attack_power = 10;
    double defense = 11;
    double speed = 12;
    int32 mental_stability = 13;
    int32 remaining_lifespan = 14;
    int32 max_lifespan = 15;
    // Combat attributes
    double crit_rate = 16;
    double crit_damage = 17;
    double dodge_rate = 18;
    double hit_rate = 19;
    double penetration = 20;
    double damage_reduction = 21;
    // Life skills
    int32 alchemy_level = 22;
    int32 artificing_level = 23;
    int32 formation_level = 24;
    int32 fire_control = 25;
    int32 herb_knowledge = 26;
    int32 mining_skill = 27;
    int32 talisman_skill = 28;
    int32 beast_taming = 29;
    // Social
    int32 reputation = 30;
    int32 sect_contribution = 31;
    // Mental / Spiritual
    int32 dao_heart = 32;
    int32 enlightenment = 33;
    int32 root_purity = 34;
    int32 poison_level = 35;
    int32 curse_level = 36;
    // New fields for complete character system
    int32 age = 37;
    string gender = 38;
    int32 appearance = 39;
    int32 charisma = 40;
    int32 obsession_count = 41;
    int32 inner_demon_resistance = 42;
    double aging_penalty = 43;
    int32 property_value = 44;
    int32 business_income = 45;
    repeated SpiritualRoot spiritual_roots = 46;
    bool root_awakened = 47;
    string mutated_root = 48;
    repeated Injury injuries = 49;
    repeated Buff buffs = 50;
    repeated Debuff debuffs = 51;
}

message Karma {
    int32 karma_value = 1;
    int32 merit = 2;
    string heavenly_mark = 3;
    int32 karmic_debt = 4;
}

message SpiritStones {
    int64 low_grade = 1;
    int64 medium_grade = 2;
    int64 high_grade = 3;
    int64 premium_grade = 4;
}

message SpellData {
    string spell_id = 1;
    string name = 2;
    string spell_type = 3;
    string element = 4;
    int32 cost = 5;
    int32 base_damage = 6;
    int32 base_heal = 7;
    int32 cooldown = 8;
    string description = 9;
    string realm_requirement = 10;
    int32 proficiency = 11;
    int64 last_cast_at = 12;
    int64 cooldown_remaining = 13;
}

message ItemData {
    string inventory_id = 1;
    string item_id = 2;
    string name = 3;
    string item_type = 4;
    int32 rarity = 5;
    string description = 6;
    int32 quantity = 7;
    bool equipped = 8;
    string slot = 9;
    int32 durability = 10;
    bool bound = 11;
    string attributes_json = 12;
}

syntax = "proto3";

package cultivation;

option go_package = "github.com/cultivation-world/shared/proto;cultivation";

import "entity.proto";
import "world.proto";

service HeavenlyDaoService {
    rpc EvaluateKarma(KarmaRequest) returns (KarmaResponse);
    rpc CheckTribulation(TribulationRequest) returns (TribulationResponse);
    rpc BalanceCheck(BalanceCheckRequest) returns (BalanceCheckResponse);
    rpc ApplyKarmaDecay(DecayRequest) returns (DecayResponse);
    // New: full breakthrough evaluation
    rpc ExecuteBreakthrough(BreakthroughRequest) returns (BreakthroughResponse);
    // New: cultivation efficiency evaluation
    rpc ExecuteCultivate(CultivateRequest) returns (CultivateResponse);
}

message KarmaRequest {
    string entity_id = 1;
    string action_type = 2;
    string target_id = 3;
    map<string, string> context = 4;
}

message KarmaResponse {
    int32 karma_change = 1;
    int32 merit_change = 2;
    string heavenly_mark = 3;
    string reason = 4;
}

message TribulationRequest {
    string entity_id = 1;
    string target_realm = 2;
    int32 karma = 3;
    int32 merit = 4;
    int32 luck = 5;
}

message TribulationResponse {
    bool will_trigger = 1;
    double probability = 2;
    double strength = 3;
    string tribulation_type = 4;
}

// Breakthrough
message BreakthroughRequest {
    string entity_id = 1;
    string current_realm = 2;
    string target_realm = 3;
    double cultivation_progress = 4;
    double comprehension = 5;
    double method_quality = 6;
    double resource_bonus = 7;
    int32 mental_stability = 8;
    int32 luck = 9;
    int32 karma = 10;
    int32 merit = 11;
}

message BreakthroughResponse {
    bool success = 1;
    string new_realm = 2;
    double success_rate = 3;
    bool tribulation_triggered = 4;
    double tribulation_strength = 5;
    string tribulation_type = 6;
    double penalty_progress_loss = 7;
    double penalty_cooldown_hours = 8;
    int32 penalty_mental_damage = 9;
    string message = 10;
}

// Cultivate
message CultivateRequest {
    string entity_id = 1;
    string realm = 2;
    repeated SpiritualRootInput spiritual_roots = 3;
    double spiritual_density = 4;
    int32 comprehension = 5;
    int32 mental_stability = 6;
    int32 base_lifespan = 7;
    int32 current_age = 8;
}

message SpiritualRootInput {
    string element = 1;
    int32 purity = 2;
}

message CultivateResponse {
    bool success = 1;
    double cultivation_gained = 2;
    double rate = 3;
    double realm_bonus = 4;
    double spiritual_mult = 5;
    double method_match = 6;
    double mental_factor = 7;
    double aging_penalty = 8;
    string message = 9;
}

message BalanceCheckRequest {}

message BalanceCheckResponse {
    bool needs_adjustment = 1;
    repeated string adjustments = 2;
    BalanceMetrics metrics = 3;
}

message DecayRequest {
    string entity_id = 1;
    int64 time_elapsed = 2;
}

message DecayResponse {
    int32 old_karma = 1;
    int32 new_karma = 2;
    int32 decay_amount = 3;
}
